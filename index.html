<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Acamay Matematik Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --green:#22c55e; --green-d:#16a34a; --green-l:#dcfce7;
    --pink:#ec4899;  --pink-d:#db2777;  --pink-l:#fce7f3;
    --blue:#3b82f6;  --blue-d:#2563eb;  --blue-l:#dbeafe;
    --orange:#f97316;--orange-d:#ea580c;--orange-l:#ffedd5;
    --purple:#a855f7;--purple-d:#9333ea;--purple-l:#f3e8ff;
    --yellow:#eab308;--yellow-l:#fef9c3;
    --red:#ef4444;   --red-l:#fee2e2;
    --bg:#e0f2fe; --surface:#ffffff;
    --text:#0f172a; --muted:#64748b;
    --border:rgba(0,0,0,0.08);
    --radius:20px; --radius-sm:12px; --radius-xl:32px;
    --shadow:0 4px 24px rgba(0,0,0,0.08);
  }
  body {
    font-family:'Nunito',sans-serif; background:var(--bg);
    min-height: 100dvh; display:flex; justify-content:center;
    align-items:flex-start; padding:12px; overflow-x:hidden;
  }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(circle at 20% 20%,rgba(59,130,246,.12) 0%,transparent 50%),
      radial-gradient(circle at 80% 80%,rgba(168,85,247,.12) 0%,transparent 50%);
  }
  #confetti-canvas { position:fixed; inset:0; pointer-events:none; z-index:999; display:none; }

  .app { width:100%; max-width:520px; position:relative; z-index:1; margin:0 auto; }
  @media(min-width:600px){ body { padding:20px; } .app { max-width:600px; } }
  
  .page { display:none; }
  .page.active { display:block; animation:appear .35s cubic-bezier(.34,1.56,.64,1); }
  @keyframes appear { from{opacity:0;transform:translateY(12px) scale(.98)} to{opacity:1;transform:translateY(0) scale(1)} }

  .logo-wrap { text-align:center; padding:10px 0 6px; }
  .logo-wrap img { width:100%; max-width:160px; height:auto; }
  .logo-wrap .tagline { font-size:11px; color:var(--muted); margin-top:4px; font-weight:600; }

  .card { background:var(--surface); border-radius:var(--radius-xl); padding:18px; margin-bottom:12px; box-shadow:var(--shadow); border:1.5px solid rgba(255,255,255,.8); }

  .name-row { display:flex; gap:8px; align-items:center; margin-bottom:12px; }
  .text-input {
    flex:1; padding:13px 14px; font-size:15px; font-weight:700;
    border:2px solid var(--border); border-radius:var(--radius-sm);
    background:#f8fafc; outline:none; transition:border-color .2s;
    font-family:'Nunito', sans-serif;
  }
  .text-input:focus { border-color:var(--blue); }
  .save-name-btn {
    padding:13px 16px; background:var(--blue); color:white; border:none;
    border-radius:var(--radius-sm); font-weight:800; font-size:13px;
    cursor:pointer; white-space:nowrap; transition:background .2s;
  }
  .saved-badge {
    display:none; font-size:10px; font-weight:700; color:var(--green-d);
    background:var(--green-l); padding:3px 8px; border-radius:99px; margin-top:4px;
  }
  .saved-badge.show { display:inline-block; }

  .sound-toggle {
    position:absolute; top:12px; right:4px; z-index: 10;
    background:white; border:1.5px solid var(--border); border-radius:99px; padding:6px 12px;
    font-size:11px; font-weight:700; color:var(--muted); box-shadow:var(--shadow); cursor:pointer;
  }

  .menu-btn {
    width:100%; padding:14px; margin-bottom:8px; border:none; border-radius:var(--radius);
    color:white; font-size:15px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.1); transition:transform .1s;
  }
  .menu-btn:active { transform:scale(.97); }
  .menu-btn .ico { width:40px; height:40px; background:rgba(255,255,255,.2); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .menu-btn .label { flex:1; text-align:left; line-height:1.2; }
  .menu-btn .label small { display:block; font-size:11px; opacity:.8; }

  .btn-green  { background:linear-gradient(135deg,#22c55e,#16a34a); }
  .btn-blue   { background:linear-gradient(135deg,#3b82f6,#2563eb); }
  .btn-purple { background:linear-gradient(135deg,#a855f7,#7c3aed); }
  .btn-pink   { background:linear-gradient(135deg,#ec4899,#db2777); }

  .back-btn {
    background:rgba(255,255,255,.8); border:1.5px solid var(--border); border-radius:99px;
    padding:8px 16px; font-size:13px; font-weight:700; color:var(--muted); margin-bottom:10px; cursor:pointer;
  }

  .diff-row { display:flex; gap:6px; margin-bottom:12px; }
  .diff-btn {
    flex:1; padding:10px 4px; border:2px solid var(--border); border-radius:var(--radius-sm);
    background:white; font-size:12px; font-weight:800; cursor:pointer; transition:.15s;
  }
  .diff-btn.active { color:white; border-color:transparent; }
  .diff-btn.easy.active   { background:var(--green); }
  .diff-btn.medium.active { background:var(--orange); }
  .diff-btn.hard.active   { background:var(--red); }

  .op-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .op-btn {
    padding:18px 8px; border:none; border-radius:var(--radius); color:white;
    font-size:30px; font-weight:900; font-family:'Baloo 2'; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:2px; transition:transform .1s;
  }
  .op-btn span { font-size:12px; font-family:'Nunito'; opacity:.9; }

  .game-topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .player-pill, .stars-pill, .timer-pill {
    background:white; border-radius:99px; padding:6px 14px; font-size:13px;
    font-weight:700; color:var(--text); box-shadow:var(--shadow); display:flex; align-items:center; gap:6px;
  }
  .timer-pill.low { color:var(--red); animation:pulse .5s infinite alternate; }
  @keyframes pulse { from{opacity:1} to{opacity:.5} }

  .streak-row { display:flex; gap:5px; margin-bottom:10px; justify-content:center; flex-wrap:wrap; }
  .dot { width:24px; height:24px; border-radius:50%; background:rgba(255,255,255,.5); border:2px solid rgba(255,255,255,.7); }
  .dot.hit  { background:var(--green); border-color:var(--green-d); transform:scale(1.1); }
  .dot.miss { background:var(--pink);  border-color:var(--pink-d); }

  .q-disp { font-family:'Baloo 2'; font-size:40px; font-weight:800; color:var(--text); margin-bottom:15px; }
  .ans-input {
    width:80px; padding:12px; font-size:24px; font-family:'Baloo 2'; text-align:center;
    border:2px solid var(--border); border-radius:var(--radius-sm); outline:none;
  }
  .check-btn {
    padding:12px 20px; background:var(--blue); color:white; border:none;
    border-radius:var(--radius-sm); font-weight:800; font-size:15px; cursor:pointer;
  }

  .memory-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; }
  .m-card {
    height:70px; background:var(--blue); border-radius:var(--radius-sm);
    display:flex; align-items:center; justify-content:center; font-size:24px;
    color:white; font-weight:800; transition:.3s; cursor:pointer;
  }
  .m-card.flipped { background:white; color:var(--blue-d); border:2px solid var(--blue); }
  .m-card.matched { visibility:hidden; }

  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
  .modal { background:white; padding:28px 24px; border-radius:var(--radius-xl); text-align:center; width:100%; max-width:340px; }
  .modal-btns { display:grid; gap:10px; }
  .btn-primary { background:var(--green); color:white; padding:14px; border-radius:12px; border:none; font-weight:800; cursor:pointer;}
  .btn-secondary { background:var(--bg); color:var(--text); padding:14px; border-radius:12px; border:none; font-weight:800; cursor:pointer;}
  
  .score-item { display:flex; justify-content:space-between; align-items:center; padding:8px 10px; border-bottom:1px solid #f1f5f9; }
  .score-item .sval { font-weight:900; color:var(--orange); }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title" style="font-family:'Baloo 2'; margin-bottom:10px;">Tebrikler! 🏆</h3>
    <p id="modal-msg" style="margin-bottom:20px;">Hafıza oyununu bitirdin.</p>
    <div class="modal-btns">
      <button class="btn-primary" onclick="closeModal('replay')">Tekrar Oyna</button>
      <button class="btn-secondary" onclick="closeModal('menu')">Menüye Dön</button>
    </div>
  </div>
</div>

<div class="app">
  <div id="p-menu" class="page active">
    <button class="sound-toggle" id="sound-btn" onclick="toggleSound()">🔊 Ses Açık</button>
    <div class="logo-wrap">
      <img src="https://i.ibb.co/8gZBQsKT/file-000000007ea07243a99669509e64e38c.png" alt="Acamay">
      <p class="tagline">✦ Matematik egzersizi — eğlenceli öğren ✦</p>
    </div>
    <div class="card">
      <div class="name-row">
        <input type="text" id="username" class="text-input" placeholder="İsmini yaz …" maxlength="20">
        <button class="save-name-btn" id="save-btn" onclick="saveName()">💾 Kaydet</button>
      </div>
      <span class="saved-badge" id="saved-badge">✓ İsim kaydedildi</span>
      <div style="height:10px;"></div>
      <button class="menu-btn btn-green" onclick="goModes('normal')">
        <div class="ico">🎮</div><div class="label">Klasik mod<small>Soruyu çöz, puan kazan</small></div>
      </button>
      <button class="menu-btn btn-blue" onclick="goModes('missing')">
        <div class="ico">🔍</div><div class="label">Eksik sayı<small>Boşluktaki sayıyı bul</small></div>
      </button>
      <button class="menu-btn btn-purple" onclick="goScores()">
        <div class="ico">🏆</div><div class="label">Skor tablosu<small>En iyi sonuçlar</small></div>
      </button>
    </div>
  </div>

  <div id="p-modes" class="page">
    <button class="back-btn" onclick="showPage('p-menu')">← Geri</button>
    <div class="card" style="display:flex;align-items:center;gap:12px;padding:12px 16px;">
      <span id="mode-ico" style="font-size:26px;">🎮</span>
      <div style="font-weight:800;font-size:15px;" id="mode-title">Klasik mod</div>
    </div>
    <div class="diff-row">
      <button class="diff-btn easy active" id="d-easy" onclick="setDiff('easy')">😊 Kolay</button>
      <button class="diff-btn medium" id="d-medium" onclick="setDiff('medium')">🔥 Orta</button>
      <button class="diff-btn hard" id="d-hard" onclick="setDiff('hard')">💀 Zor</button>
    </div>
    <div class="op-grid">
      <button class="op-btn btn-green" onclick="start(1)">+<span>Toplama</span></button>
      <button class="op-btn btn-pink" onclick="start(2)">−<span>Çıkarma</span></button>
      <button class="op-btn btn-blue" onclick="start(3)">×<span>Çarpma</span></button>
      <button class="op-btn btn-orange" onclick="start(4)">÷<span>Bölme</span></button>
    </div>
  </div>

  <div id="p-game" class="page">
    <div class="game-topbar">
      <div class="player-pill">👤 <span id="g-name">Oyuncu</span></div>
      <div class="right-pills" style="display:flex; gap:4px;">
        <div class="timer-pill" id="timer-pill" style="display:none">⏱ <span id="timer-val">15</span></div>
        <div class="stars-pill">⭐ <span id="g-stars">0</span></div>
      </div>
    </div>
    <div class="streak-row" id="dot-row"></div>
    <div class="card q-card" style="text-align:center;">
      <div class="q-disp" id="q-disp">?</div>
      <div style="display:flex; gap:10px; justify-content:center; align-items:center;">
        <input type="number" id="ans" class="ans-input" placeholder="?" inputmode="numeric">
        <button class="check-btn" onclick="checkAns()">Tamam ✓</button>
      </div>
      <div id="fb" style="margin-top:12px; font-weight:800; font-size:15px; min-height:22px;"></div>
    </div>
  </div>

  <div id="p-result" class="page">
    <div class="card result-card" style="text-align:center;">
      <span id="r-emoji" style="font-size:48px;">🎉</span>
      <div style="font-family:'Baloo 2'; font-size:64px; font-weight:800; color:var(--orange); line-height:1;" id="r-score">0</div>
      <p id="r-grade" style="font-weight:800; font-size:16px; margin-bottom:12px; color:var(--muted);">Harikasın!</p>
      <div id="bonus-unlocked" style="display:none;">
        <button onclick="startMemoryGame()" style="background:linear-gradient(135deg,var(--purple),var(--purple-d)); color:white; width:100%; padding:16px; border-radius:12px; font-weight:800; margin:10px 0; border:none; cursor:pointer;">🧠 Ödül Zeka Oyununu Oyna!</button>
      </div>
      <div style="display:grid; gap:8px;">
        <button class="btn-green" style="padding:14px; border-radius:12px; border:none; color:white; font-weight:800;" onclick="replayGame()">🔄 Tekrar Oyna</button>
        <button class="btn-secondary" onclick="showPage('p-menu')">🏠 Ana Menü</button>
      </div>
    </div>
  </div>

  <div id="p-bonus" class="page">
    <button class="back-btn" onclick="showPage('p-menu')">← Ana Menü</button>
    <div class="card">
      <div style="text-align:center; margin-bottom:12px;">
        <h3 style="font-family:'Baloo 2';">🧠 Zeka Egzersizi</h3>
        <small id="memory-timer" style="color:var(--muted); font-weight:700;">Süre: 0</small>
      </div>
      <div id="memory-board" class="memory-grid"></div>
    </div>
  </div>

  <div id="p-scores" class="page">
    <button class="back-btn" onclick="showPage('p-menu')">← Geri</button>
    <div class="card">
      <div style="font-weight:800; margin-bottom:12px;">🏆 En İyi 10 Skor</div>
      <div id="score-list"></div>
    </div>
  </div>
</div>

<script>
let audioCtx=null, soundOn=true;
let mode='normal', op=1, lastOp=1, diff='easy';
let score=0, qIdx=0, correct=0, streak=0, maxStreak=0, correctVal=0;
let timerInt=null, timeLeft=0;
let scores = JSON.parse(localStorage.getItem('acamay_scores') || '[]');

function getCtx(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playTone(freq,type,dur,vol,delay){
  if(!soundOn)return; try{
    const c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination); o.type=type;o.frequency.value=freq;
    const t=c.currentTime+(delay||0); g.gain.setValueAtTime(vol||0.2,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur); o.start(t);o.stop(t+dur);
  }catch(e){}
}

function saveName(){
  const nm = document.getElementById('username').value.trim();
  if(!nm){ alert("Lütfen bir isim yaz!"); return; }
  localStorage.setItem('acamay_user', nm);
  const badge = document.getElementById('saved-badge');
  badge.classList.add('show');
  setTimeout(()=>badge.classList.remove('show'), 2000);
}

function loadName(){
  const saved = localStorage.getItem('acamay_user');
  if(saved) document.getElementById('username').value = saved;
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goModes(m){
  const nm = document.getElementById('username').value.trim();
  if(!nm){ alert("Lütfen ismini yaz ve Kaydet'e bas! ✍️"); return; }
  mode=m;
  document.getElementById('mode-title').textContent = m==='missing'?'Eksik Sayı':'Klasik Mod';
  showPage('p-modes');
}

function setDiff(d){
  diff=d; document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('d-'+d).classList.add('active');
}

function start(o){
  op=o; lastOp=o; score=0; qIdx=0; correct=0; streak=0;
  document.getElementById('g-name').textContent = document.getElementById('username').value;
  document.getElementById('g-stars').textContent = '0';
  document.getElementById('timer-pill').style.display = diff==='hard'?'flex':'none';
  buildDots(); nextQ(); showPage('p-game');
}

function buildDots(){
  const row=document.getElementById('dot-row'); row.innerHTML='';
  for(let i=0;i<10;i++){
    const d=document.createElement('div'); d.className='dot'; d.id='dot-'+i; row.appendChild(d);
  }
}

function nextQ(){
  qIdx++; if(qIdx>10){ finishGame(); return; }
  let M = diff==='easy'?10:diff==='medium'?25:50;
  let a, b, sym;
  if(op===1){ a=rnd(M); b=rnd(M); correctVal=a+b; sym='+'; }
  else if(op===2){ a=rndRange(10,M); b=rnd(a); correctVal=a-b; sym='-'; }
  else if(op===3){ a=rnd(12); b=rnd(10); correctVal=a*b; sym='×'; }
  else { b=rndRange(1,10); a=b*rnd(10); correctVal=a/b; sym='÷'; }

  let disp = mode==='normal' ? `${a} ${sym} ${b} = ?` : `? ${sym} ${b} = ${correctVal + (op===1?0:0)}`;
  if(mode==='missing') {
      if(op===1) { document.getElementById('q-disp').textContent = `? + ${b} = ${a+b}`; correctVal = a; }
      else if(op===2) { document.getElementById('q-disp').textContent = `? - ${b} = ${a-b}`; correctVal = a; }
      else { document.getElementById('q-disp').textContent = `${a} ${sym} ${b} = ?`; }
  } else {
      document.getElementById('q-disp').textContent = disp;
  }

  document.getElementById('ans').value = '';
  document.getElementById('ans').focus();
  if(diff==='hard') startTimer();
}

function startTimer(){
  clearInterval(timerInt); timeLeft=10;
  document.getElementById('timer-val').textContent=timeLeft;
  timerInt=setInterval(()=>{
    timeLeft--; document.getElementById('timer-val').textContent=timeLeft;
    if(timeLeft<=0){ clearInterval(timerInt); checkAns(); }
  },1000);
}

function checkAns(){
  clearInterval(timerInt);
  const val = parseInt(document.getElementById('ans').value);
  const dot = document.getElementById('dot-'+(qIdx-1));
  if(val === correctVal){
    correct++; streak++; score += (diff==='easy'?10:diff==='medium'?20:30);
    playTone(600,'sine',0.1,0.2); dot.classList.add('hit');
  } else {
    streak=0; dot.classList.add('miss'); playTone(200,'square',0.2,0.2);
  }
  document.getElementById('g-stars').textContent = score;
  setTimeout(nextQ, 800);
}

function finishGame(){
  showPage('p-result');
  document.getElementById('r-score').textContent = score;
  document.getElementById('bonus-unlocked').style.display = correct >= 9 ? 'block' : 'none';
  saveScore();
}

function saveScore(){
  scores.push({name: localStorage.getItem('acamay_user'), score: score});
  scores.sort((a,b)=>b.score - a.score);
  scores = scores.slice(0,10);
  localStorage.setItem('acamay_scores', JSON.stringify(scores));
}

function goScores(){
  showPage('p-scores');
  document.getElementById('score-list').innerHTML = scores.map((s,i)=>`
    <div class="score-item"><span>${i+1}. ${s.name}</span><span class="sval">${s.score} ⭐</span></div>
  `).join('');
}

function rnd(n){return Math.floor(Math.random()*(n+1));}
function rndRange(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function replayGame(){ showPage('p-modes'); }
function toggleSound(){ soundOn=!soundOn; document.getElementById('sound-btn').textContent=soundOn?'🔊 Ses Açık':'🔇 Ses Kapalı'; }

window.onload = loadName;

// Hafıza oyunu için temel mantık (Sizin kodunuzun optimize hali)
let flipped=[];
function startMemoryGame(){
  showPage('p-bonus');
  const items = ['🍎','🍎','🚀','🚀','💎','💎','👻','👻','🐱','🐱','🌈','🌈','🍦','🍦','⚽','⚽'].sort(()=>Math.random()-0.5);
  const board = document.getElementById('memory-board');
  board.innerHTML = '';
  items.forEach(item => {
    const c = document.createElement('div'); c.className='m-card'; c.dataset.v = item; c.textContent = '?';
    c.onclick = () => {
      if(flipped.length<2 && !c.classList.contains('flipped')){
        c.classList.add('flipped'); c.textContent = c.dataset.v; flipped.push(c);
        if(flipped.length===2){
          setTimeout(()=>{
            if(flipped[0].dataset.v === flipped[1].dataset.v){
              flipped[0].classList.add('matched'); flipped[1].classList.add('matched');
            } else {
              flipped[0].classList.remove('flipped'); flipped[1].classList.remove('flipped');
              flipped[0].textContent = '?'; flipped[1].textContent = '?';
            }
            flipped = [];
            if(document.querySelectorAll('.matched').length === 16) {
                document.getElementById('modal').style.display='flex';
            }
          }, 600);
        }
      }
    };
    board.appendChild(c);
  });
}

function closeModal(act){
  document.getElementById('modal').style.display='none';
  if(act==='replay') startMemoryGame(); else showPage('p-menu');
}
</script>
</body>
</html>
